services:
  - type: web
    name: focusflow-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: focusflow-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false

  - type: redis
    name: focusflow-redis
    plan: free
